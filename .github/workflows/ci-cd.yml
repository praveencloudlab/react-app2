name: React CI/CD Pipeline

on:
  push:
    branches: [ master, main, feature-prod-details ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build App
        # Note: Since I see 'next.config', this is a Next.js app!
        # Next.js uses 'npm run build' just like React.
        run: npm run build
        env:
          CI: false

      - name: Deploy 🚀
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # Next.js usually builds to 'out' or '.next'
          branch: gh-pages