name: React CI/CD Pipeline

on:
  push:
    branches: [ master, main, feature-prod-details ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
  defaults:
    run:
      working-directory: ./app1 # Replace with your folder name

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      # We use 'npm ci' because it's faster and more reliable for CI/CD
      run: npm ci || npm install 

    - name: Build React App
      # This is where it was failing before
      run: npm run build
      env:
        CI: false # This prevents some warnings from being treated as errors

    - name: Deploy 🚀
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: build
        branch: gh-pages