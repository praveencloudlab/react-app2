name: Next.js CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - master
      - feature-prod-details
  pull_request:
    branches: 
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build
        env:
          CI: false

      - name: Check if 'out' exists
        # This will show up in your logs to help us debug
        run: ls -d out || echo "OUT FOLDER NOT FOUND"

      - name: Deploy to GitHub Pages 🚀
        # This only runs on your main/master branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out 
          branch: gh-pages