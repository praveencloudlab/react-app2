name: Next.js CI/CD Pipeline

on:
  push:
    branches: [ master, main, feature-prod-details ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This tells GitHub to go INTO the app1 folder for all commands
    defaults:
      run:
        working-directory: ./app1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build
        env:
          CI: false

      - name: Deploy to GitHub Pages 🚀
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # Note the path: it needs the app1 prefix to find the 'out' folder
          folder: app1/out   
          branch: gh-pages