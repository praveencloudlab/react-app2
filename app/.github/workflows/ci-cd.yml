name: Next.js CI/CD Pipeline

on:
  push:
    branches: [ master, main, feature-prod-details ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js App
        # Next.js uses 'next build' which is triggered by 'npm run build'
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out   # Next.js 'export' creates an 'out' folder, not 'build'
          branch: gh-pages